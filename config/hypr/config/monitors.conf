################
### MONITORS ###
################
# See https://wiki.hypr.land/Configuring/Monitors/

# LEFT — vertical Lenovo (1080x1920 after rotation)
$leftMonitor = desc:Lenovo Group Limited LEN T23i-20 VNA51W73
monitor = $leftMonitor, preferred, 0x0, 1, transform, 1

# CENTER — main Lenovo
monitor = HDMI-A-2, preferred, 1080x0, 1

# LAPTOP
monitor = eDP-1, preferred, 1080x1080, 2

# Fallback
monitor = , preferred, auto, 1

# Bind workspaces to monitors
# workspace = 1, monitor:DP-5, default:true
workspace = 2, monitor:$leftMonitor, default:true
workspace = 3, monitor:HDMI-A-2, default:true

workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1

workspace = 7, monitor:HDMI-A-2
workspace = 8, monitor:HDMI-A-2
workspace = 9, monitor:HDMI-A-2

